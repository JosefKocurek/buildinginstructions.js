<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <title>Manuál – DSH</title>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <style>
    /* B&W edge UI for viewer – full viewport layout */
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #fff; color: #000; font-family: system-ui, sans-serif;
    }
    #main_canvas_holder {
      position: absolute;
      left: 0; top: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
    }
    #main_canvas {
      display: block;
      position: absolute;
      left: 0; top: 0;
      width: 100%; height: 100%;
    }
    #instructions_decorations {
      position: absolute;
      left: 0;
      top: 56px;
      pointer-events: none;
    }
    #instructions_decorations * { pointer-events: auto; }
    #pli { border: 2px solid #000; background: #fff; }
    #empty_step { display: block; padding: 0.5rem; border: 2px solid #000; background: #fff; font-weight: 700; }
    #top_buttons { position: absolute; top: 0; left: 0; right: 0; min-height: 48px; padding: 0.5rem; background: #fff; border-bottom: 2px solid #000; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; z-index: 2; }
    #top_buttons .top_button, #stepToContainer input, #numberOfSteps { border: 2px solid #000; background: #fff; color: #000; padding: 0.35rem 0.6rem; font-weight: 600; }
    #top_buttons .top_button:hover { background: #000; color: #fff; }
    #pageNumber { width: 3rem; text-align: center; }
    #stepToContainer::before { content: "Krok "; font-weight: 700; }
    #numberOfSteps { margin-left: 0.25rem; }
    .camera_buttons { position: absolute; right: 0.5rem; bottom: 0.5rem; display: flex; gap: 0.25rem; }
    .camera_buttons .ui_control { border: 2px solid #000; background: #fff; color: #000; padding: 0.5rem; cursor: pointer; }
    .camera_buttons .ui_control:hover { background: #000; color: #fff; }
    #next_button_large, #done_button { position: absolute; right: 0.5rem; bottom: 3rem; border: 2px solid #000; background: #fff; color: #000; padding: 0.5rem 1rem; cursor: pointer; font-weight: 700; }
    #next_button_large:hover, #done_button:hover { background: #000; color: #fff; }
    #prev_button { position: absolute; left: 0.5rem; bottom: 0.5rem; border: 2px solid #000; background: #fff; color: #000; padding: 0.5rem; cursor: pointer; }
    #prev_button:hover { background: #000; color: #fff; }
    #pli_preview_section, #done_section, #color_picker, #green, #options { display: none !important; }
  </style>
</head>
<body>
  <div id="main_canvas_holder">
    <canvas id="main_canvas"></canvas>
    <div id="instructions_decorations">
      <span id="empty_step">KROK</span>
      <canvas id="pli"></canvas>
      <div id="pli_drag_horizontal">
        <div id="pli_icon_right"><svg viewBox="-10,-10,20,20" width="20" height="20"><path d="M 9 6, 9 9, -9 9, -9 -9, 9 -9, 9 -6" fill="none" stroke="black" stroke-width="2"/><line x1="0" y1="0" x2="9" y2="0" stroke="black" stroke-width="2"/><line x1="9" y1="0" x2="5" y2="5" stroke="black" stroke-width="2"/><line x1="9" y1="0" x2="5" y2="-5" stroke="black" stroke-width="2"/></svg></div>
        <div id="pli_icon_left"><svg viewBox="-10,-10,20,20" width="20" height="20"><path d="M -9 6, -9 9, 9 9, 9 -9, -9 -9, -9 -6" fill="none" stroke="black" stroke-width="2"/><line x1="0" y1="0" x2="-9" y2="0" stroke="black" stroke-width="2"/><line x1="-9" y1="0" x2="-5" y2="5" stroke="black" stroke-width="2"/><line x1="-9" y1="0" x2="-5" y2="-5" stroke="black" stroke-width="2"/></svg></div>
      </div>
      <div id="pli_drag_vertical">
        <div id="pli_icon_down"><svg viewBox="-10,-10,20,20" width="20" height="20"><path d="M 6 9, 9 9, 9 -9, -9 -9, -9 9, -6 9" fill="none" stroke="black" stroke-width="2"/><line x1="0" y1="0" x2="0" y2="9" stroke="black" stroke-width="2"/><line x1="0" y1="9" x2="5" y2="5" stroke="black" stroke-width="2"/><line x1="0" y1="9" x2="-5" y2="5" stroke="black" stroke-width="2"/></svg></div>
        <div id="pli_icon_up"><svg viewBox="-10,-10,20,20" width="20" height="20"><path d="M 6 -9, 9 -9, 9 9, -9 9, -9 -9, -6 -9" fill="none" stroke="black" stroke-width="2"/><line x1="0" y1="0" x2="0" y2="-9" stroke="black" stroke-width="2"/><line x1="0" y1="-9" x2="5" y2="-5" stroke="black" stroke-width="2"/><line x1="0" y1="-9" x2="-5" y2="-5" stroke="black" stroke-width="2"/></svg></div>
      </div>
      <span class="decoration_holder"><div id="multiplier">x1</div></span>
      <span class="decoration_holder">
        <div id="rotator">
          <svg viewBox="-52,-52,104,104" fill="none" stroke="black" stroke-width="12">
            <g id="full_arrow"><path id="half_arrow" d="M 25,-14 40,-10 48,-23 M 40,-10 C 30,-50 -30,-50 -40,-10 M 40,-10 Z" />
            <g transform="scale(-1 -1)"><use href="#half_arrow"/></g></g>
            <animateTransform href="#full_arrow" attributeName="transform" attributeType="XML" id="rotator_animation" type="rotate" from="0 0 0" to="180 0 0" dur="0.4s" begin="0" repeatCount="1" fill="freeze" />
          </svg>
        </div>
      </span>
    </div>
  </div>
  <div id="pli_preview_section"><div id="preview_background" class="background"></div><div id="preview_holder" class="holder"><div id="preview_parent"><canvas id="secondary_canvas"></canvas></div><div id="preview_info"></div></div></div>
  <div id="done_section"><div id="done_background"></div><div id="done_holder" class="holder"></div></div>
  <div id="color_picker"><div id="color_picker_background" class="background"></div><div id="color_picker_holder" class="holder"></div></div>
  <div id="green"><div id="editor"></div></div>
  <div id="options"></div>

  <script>
    (function() {
      var p = window.location.pathname;
      var underDsh = p.indexOf('/DSH/') >= 0;
      var scriptBase = underDsh ? '/' : './';
      var J = scriptBase + 'js/';
      document.write('<script src="' + J + 'jquery.min.js"><\/script>');
      document.write('<script src="' + J + 'three.min.js"><\/script>');
      document.write('<script src="' + J + 'OrbitControls.js"><\/script>');
      document.write('<script src="' + J + 'CopyShader.js"><\/script>');
      document.write('<script src="' + J + 'Pass.js"><\/script>');
      document.write('<script src="' + J + 'OutlinePass.js"><\/script>');
      document.write('<script src="' + J + 'ShaderPass.js"><\/script>');
      document.write('<script src="' + J + 'FXAAShader.js"><\/script>');
      document.write('<script src="' + J + 'RenderPass.js"><\/script>');
      document.write('<script src="' + J + 'MaskPass.js"><\/script>');
      document.write('<script src="' + J + 'EffectComposer.js"><\/script>');
      document.write('<script src="' + J + 'colors.js"><\/script>');
      document.write('<script src="' + J + 'LDRShaders.js"><\/script>');
      document.write('<script src="' + J + 'LDRColorMaterials.js"><\/script>');
      document.write('<script src="' + J + 'pli.js"><\/script>');
      document.write('<script src="' + J + 'LDRSVG.js"><\/script>');
      document.write('<script src="' + J + 'LDROptions.js"><\/script>');
      document.write('<script src="' + J + 'LDRGeometries.js"><\/script>');
      document.write('<script src="' + J + 'LDRLoader.js"><\/script>');
      document.write('<script src="' + J + 'LDRStepHandler.js"><\/script>');
      document.write('<script src="' + J + 'RectanglePacking.js"><\/script>');
      document.write('<script src="' + J + 'LDRPLIBuilder.js"><\/script>');
      document.write('<script src="' + J + 'LDRPLIPreview.js"><\/script>');
      document.write('<script src="' + J + 'LDRButtons.js"><\/script>');
      document.write('<script src="' + J + 'LDRMeasurer.js"><\/script>');
      document.write('<script src="' + J + 'LDRGenerator.js"><\/script>');
      document.write('<script src="' + J + 'LDRStuds.js"><\/script>');
      document.write('<script src="' + J + 'LDRAssemblies.js"><\/script>');
      document.write('<script src="' + J + 'LDRInstructionsManager.js"><\/script>');
    })();
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var p = window.location.pathname;
      var underDsh = p.indexOf('/DSH/') >= 0;
      var base = underDsh ? '/' : '';
      var model = base + 'models/DSH.ldr';

      LDR.Options = LDR.Options || {};
      LDR.Options.showCameraButtons = 1;
      LDR.Options.showNumberOfSteps = 1;
      LDR.Options.showOldColors = 1;
      LDR.Options.studHighContrast = 0;
      LDR.Options.studLogo = 0;

      var options = {
        canEdit: false,
        buildAssemblies: true,
        key: model,
        adPeek: 0,
        setUpOptions: false,
        showNumberOfSteps: true,
        pliMaxWidthPercentage: 30,
        pliMaxHeightPercentage: 30,
        cleanUpPrimitivesAndSubParts: true,
        idToUrl: function(id) {
          var lower = id.toLowerCase();
          if (!lower.endsWith('.dat')) return [base + id];
          return [
            base + 'ldraw_parts/' + lower,
            base + 'ldraw_unofficial/' + lower,
            base + 'official/' + lower
          ];
        }
      };

      var step = 1;
      var stepFromUrl = (location.search || '').split('&').map(function(x) { var t = x.split('='); return { k: t[0], v: t[1] }; }).filter(function(x) { return x.k === 'step'; })[0];
      if (stepFromUrl && stepFromUrl.v) step = parseInt(stepFromUrl.v, 10) || 1;

      var baseUrl = underDsh ? '/DSH/viewer.html?step=' : 'viewer.html?step=';
      window.manager = new LDR.InstructionsManager(model, '#', 14, null, function(){}, baseUrl, step, options);

      (function initLayout() {
        if (window.manager.scene) window.manager.scene.background = new THREE.Color(0xFFFFFF);
        function resize() {
          if (window.manager && window.manager.onWindowResize) window.manager.onWindowResize(true);
        }
        setTimeout(resize, 0);
        setTimeout(resize, 150);
        requestAnimationFrame(function() { requestAnimationFrame(resize); });
        window.addEventListener('load', resize);
      })();

      (function krokLabel() {
        var n = document.getElementById('numberOfSteps');
        if (!n) { setTimeout(krokLabel, 100); return; }
        var obs = new MutationObserver(function() {
          if (n.textContent.indexOf('/') >= 0) n.textContent = ' z ' + n.textContent.replace(/^\s*\/\s*/, '').trim();
        });
        obs.observe(n, { childList: true, characterData: true, subtree: true });
      })();
    });
  </script>
</body>
</html>
