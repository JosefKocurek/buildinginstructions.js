<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <title>Vše nej! — DSH</title>
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html { height: 100%; overflow: hidden; }
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #fff;
      color: #000;
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .page-title {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      font-size: clamp(4rem, 20vw, 12rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      text-transform: none;
      text-align: center;
      width: 100%;
      max-width: 100vw;
      margin: 0;
      transform: rotate(calc(-2deg + var(--sway-x, 0deg))) translate(calc(var(--sway-tx, 0) * 1px), calc(var(--sway-ty, 0) * 1px));
      transition: transform 0.15s ease-out;
    }
    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      color: #000;
      text-decoration: none;
      border: 1px solid #000;
      background: #fff;
      box-shadow: 2px 2px 0 #000;
      transition: background 0.2s, color 0.2s;
    }
    .back-link:hover {
      background: #000;
      color: #fff;
    }
    .back-link svg {
      width: 24px;
      height: 24px;
    }
  </style>
</head>
<body>
  <a href="dsh-viewer.html" class="back-link" title="Zpět" aria-label="Zpět na návod">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </a>
  <h1 class="page-title" id="page-title">Vše nej!</h1>

  <script>
    (function sway() {
      var title = document.getElementById('page-title');
      if (!title) return;
      function onMove(e) {
        var w = window.innerWidth;
        var h = window.innerHeight;
        var x = (e.clientX / w) * 2 - 1;
        var y = (e.clientY / h) * 2 - 1;
        title.style.setProperty('--sway-x', (x * 4) + 'deg');
        title.style.setProperty('--sway-tx', x * 8);
        title.style.setProperty('--sway-ty', y * 6);
      }
      window.addEventListener('mousemove', onMove);
    })();
  </script>
</body>
</html>
